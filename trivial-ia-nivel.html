<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Nivel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green:   #18c25a;
  --green-d: #12a84c;
  --white:   #ffffff;
  --text:    #e8eaf6;
  --muted:   #8892b0;
  --border:  #1e2a4a;
  --bg:      #ffffff;
}

html, body {
  height: 100%;
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: #e8eaf6;
}

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

/* ── BACK ── */
.btn-back {
  position: fixed;
  top: 28px; left: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #0d1235;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  padding: 10px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
  z-index: 10;
}
.btn-back:hover { border-color: var(--green); color: var(--green); }
.btn-back svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none;
  stroke-width: 2.5;
  stroke-linecap: round; stroke-linejoin: round;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 48px;
  animation: rise .38s cubic-bezier(0.16,1,0.3,1) both;
}

.brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 14px;
  display: block;
}

.header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: clamp(30px, 5vw, 42px);
  text-transform: uppercase;
  letter-spacing: -0.5px;
  color: #e8eaf6;
  line-height: 1;
  margin-bottom: 10px;
}

.header p {
  font-size: 14px;
  color: var(--muted);
}

/* ── LEVEL CARDS ── */
.levels {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 480px;
  animation: rise .42s .06s cubic-bezier(0.16,1,0.3,1) both;
}

.level-card {
  background: #0d1235;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 24px 28px;
  cursor: pointer;
  transition: all .18s;
  display: flex;
  align-items: center;
  gap: 20px;
  position: relative;
  overflow: hidden;
}

.level-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--level-color, var(--green));
  transform: scaleY(0);
  transition: transform .2s;
  transform-origin: bottom;
}

.level-card:hover {
  border-color: var(--level-color, var(--green));
  box-shadow: 0 8px 32px rgba(0,0,0,0.06);
  transform: translateX(4px);
}

.level-card:hover::before { transform: scaleY(1); }
.level-card:active { transform: translateX(2px); }

/* selected state */
.level-card.selected {
  border-color: var(--level-color, var(--green));
  background: var(--level-bg, #edfaf3);
}
.level-card.selected::before { transform: scaleY(1); }

/* ── DOT ── */
.level-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  transition: all .18s;
  position: relative;
}

.level-card.selected .level-dot,
.level-card:hover .level-dot {
  border-color: var(--level-color, var(--green));
  background: var(--level-color, var(--green));
}

.level-card.selected .level-dot::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: #fff;
}

/* ── TEXT ── */
.level-info { flex: 1; }

.level-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #e8eaf6;
  margin-bottom: 4px;
}

.level-desc {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}

/* ── PIPS (difficulty dots) ── */
.level-pips {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.pip {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}

.pip.filled { background: var(--level-color, var(--green)); }

/* ── START BUTTON ── */
.btn-start-wrap {
  width: 100%;
  max-width: 480px;
  margin-top: 20px;
  animation: rise .42s .12s cubic-bezier(0.16,1,0.3,1) both;
}

.btn-start {
  width: 100%;
  padding: 15px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .18s;
  opacity: 0.4;
  pointer-events: none;
}

.btn-start.ready {
  opacity: 1;
  pointer-events: all;
}

.btn-start.ready:hover  { background: var(--green-d); }
.btn-start.ready:active { transform: scale(0.99); }

@keyframes rise {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (max-width: 560px) {
  .btn-back { top: 16px; left: 16px; }
  .level-card { padding: 20px 20px; }
}
</style>
</head>
<body>

<a class="btn-back" href="trivial-modos.html">
  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  Volver
</a>

<div class="page">

  <div class="header">
    <span class="brand">Trivial — vs IA</span>
    <h1>Elige tu nivel</h1>
    <p>Selecciona la dificultad con la que quieres jugar</p>
  </div>

  <div class="levels">

    <div class="level-card" id="level-facil"
      style="--level-color:#18c25a; --level-bg:#edfaf3;"
      onclick="selectLevel('facil')">
      <div class="level-dot"></div>
      <div class="level-info">
        <div class="level-name">Fácil</div>
        <div class="level-desc">Preguntas básicas. Ideal para empezar o calentar motores.</div>
      </div>
      <div class="level-pips">
        <div class="pip filled" style="--level-color:#18c25a"></div>
        <div class="pip"></div>
        <div class="pip"></div>
      </div>
    </div>

    <div class="level-card" id="level-medio"
      style="--level-color:#f5a623; --level-bg:#fffbf0;"
      onclick="selectLevel('medio')">
      <div class="level-dot"></div>
      <div class="level-info">
        <div class="level-name">Medio</div>
        <div class="level-desc">Preguntas con algo más de dificultad. Para jugadores con soltura.</div>
      </div>
      <div class="level-pips">
        <div class="pip filled" style="--level-color:#f5a623"></div>
        <div class="pip filled" style="--level-color:#f5a623"></div>
        <div class="pip"></div>
      </div>
    </div>

    <div class="level-card" id="level-dificil"
      style="--level-color:#e84545; --level-bg:#fff5f5;"
      onclick="selectLevel('dificil')">
      <div class="level-dot"></div>
      <div class="level-info">
        <div class="level-name">Difícil</div>
        <div class="level-desc">Preguntas exigentes. Solo para los que de verdad saben.</div>
      </div>
      <div class="level-pips">
        <div class="pip filled" style="--level-color:#e84545"></div>
        <div class="pip filled" style="--level-color:#e84545"></div>
        <div class="pip filled" style="--level-color:#e84545"></div>
      </div>
    </div>

  </div>

  <div class="btn-start-wrap">
    <button class="btn-start" id="btn-start" onclick="startGame()">
      Empezar partida
    </button>
  </div>

</div>

<script>
let selectedLevel = null;

function selectLevel(level) {
  selectedLevel = level;
  ['facil','medio','dificil'].forEach(l => {
    document.getElementById('level-' + l).classList.toggle('selected', l === level);
  });
  document.getElementById('btn-start').classList.add('ready');
}

function startGame() {
  if (!selectedLevel) return;
  window.location.href = `trivial-ia-juego.html?nivel=${selectedLevel}`;
}
</script>

</body>
</html>
