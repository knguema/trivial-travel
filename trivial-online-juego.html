<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Online</title>
<link rel="icon" type="image/png" href="logo-trivial.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green:   #2d7dd2;
  --green-d: #1a6ab8;
  --white:   #ffffff;
  --text:    #0a1a10;
  --muted:   #4d7560;
  --border:  #c6e8d4;
}

html, body {
  height: 100%;
  font-family: 'Barlow', sans-serif;
  background: #0a0e1a;
  color: #fff;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen { height:100vh; display:none; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.screen.active { display:flex; animation: rise .35s cubic-bezier(0.16,1,0.3,1) both; }

@keyframes rise { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ══════════════════════════════════════
   WAITING SCREEN
══════════════════════════════════════ */
#screen-waiting { background: #0a0e1a; }

.wait-inner { text-align:center; max-width:400px; }

.wait-brand {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800; font-size:12px;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--green); margin-bottom:20px; display:block;
}

.wait-title {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800; font-size:32px;
  text-transform:uppercase; letter-spacing:-0.5px;
  color:#fff; margin-bottom:8px;
}

.wait-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:36px; }

.wait-players {
  display:flex; flex-direction:column; gap:8px;
  margin-bottom:28px;
}

.wait-player {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;
  animation: rise .25s cubic-bezier(0.16,1,0.3,1) both;
}

.wait-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.wait-name { flex:1; font-size:14px; font-weight:500; }
.wait-you {
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:10px; letter-spacing:1px; text-transform:uppercase;
  color:var(--green); background:rgba(24,194,90,0.1);
  padding:3px 8px; border-radius:2px;
}

.dots span {
  display:inline-block; width:7px; height:7px;
  border-radius:50%; background:rgba(255,255,255,0.2);
  margin:0 3px; animation:bounce .9s infinite;
}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0);background:rgba(255,255,255,0.2)}50%{transform:translateY(-5px);background:var(--green)}}

/* ══════════════════════════════════════
   SPIN SCREEN (ruleta)
══════════════════════════════════════ */
#screen-spin {
  background: #0d1130;
  gap: 0;
  justify-content: space-between;
  padding: 20px 24px 28px;
}

.spin-top {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px; width: 100%;
}

.turn-banner {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px; padding: 9px 24px;
  font-size: 13px; color: rgba(255,255,255,0.55);
}
.turn-banner strong { color: #fff; font-weight: 600; }

.round-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

/* ── WHEEL ── */
.wheel-wrap {
  position: relative;
  width: min(340px, 78vw);
  height: min(340px, 78vw);
  flex-shrink: 0;
}

.wheel-pointer {
  position: absolute;
  left: -18px; top: 50%;
  transform: translateY(-50%) rotate(-90deg);
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 30px solid #2d7dd2;
  filter: drop-shadow(0 0 8px rgba(45,125,210,0.9));
  z-index: 10;
}

#wheel-canvas { border-radius: 50%; display: block; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

.wheel-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 48px; height: 48px;
  background: #0d1130; border-radius: 50%;
  border: 3px solid #2d7dd2; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 11px;
  color: #2d7dd2; letter-spacing: 1px;
}

/* ── CATEGORY REVEAL ── */
.cat-reveal {
  display: none; flex-direction: column;
  align-items: center; gap: 6px;
  padding: 16px 28px; border-radius: 8px; border: 1.5px solid;
  animation: popIn .45s cubic-bezier(0.175,0.885,0.32,1.275) both;
  min-width: 220px; text-align: center;
}
.cat-reveal.show { display: flex; }

@keyframes popIn {
  from { opacity:0; transform: scale(0.6); }
  to   { opacity:1; transform: scale(1); }
}

.cat-reveal-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 10px;
  letter-spacing: 2.5px; text-transform: uppercase; opacity: 0.6;
}

.cat-reveal-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 28px;
  text-transform: uppercase; letter-spacing: -0.5px; line-height: 1;
}

/* ── DIFFICULTY SELECTOR ── */
.diff-selector {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 340px;
  animation: rise .3s .1s cubic-bezier(0.16,1,0.3,1) both;
}
.diff-selector.show { display: flex; }

.diff-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

.diff-btns {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  width: 100%;
}

.diff-btn {
  padding: 12px 8px;
  border-radius: 4px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  transition: all .15s;
  text-align: center;
  display: flex; flex-direction: column; gap: 4px;
  align-items: center;
}

.diff-btn:hover { transform: translateY(-2px); }

.diff-btn.easy  { --dc: #18c25a; }
.diff-btn.medio { --dc: #f5a623; }
.diff-btn.hard  { --dc: #e84545; }

.diff-btn:hover,
.diff-btn.selected {
  border-color: var(--dc);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.diff-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 15px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--dc);
}

.diff-pts {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}

.diff-pips {
  display: flex; gap: 3px;
}

.pip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
}
.pip.on { background: var(--dc); }

/* ── SPIN BUTTON ── */
.btn-main {
  position: relative;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 16px 48px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 0 30px rgba(24,194,90,0.4), 0 4px 20px rgba(0,0,0,0.3);
  overflow: hidden;
}

.btn-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  border-radius: 50px;
}

.btn-main::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50px;
  background: linear-gradient(135deg, var(--green), #0a9e46);
  z-index: -1;
  animation: btnGlow 2s ease-in-out infinite;
}

@keyframes btnGlow {
  0%,100% { box-shadow: 0 0 20px rgba(24,194,90,0.4); }
  50%      { box-shadow: 0 0 50px rgba(24,194,90,0.8); }
}

.btn-main:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 0 50px rgba(24,194,90,0.6), 0 8px 30px rgba(0,0,0,0.4);
}

.btn-main:active { transform: scale(0.97); }

.btn-main:disabled {
  opacity: 0.4;
  pointer-events: none;
  animation: none;
  box-shadow: none;
}

/* ── SPIN COUNTDOWN BADGE (top-left) ── */
.spin-countdown-badge {
  position: absolute;
  top: 16px; left: 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 32px;
  color: #fff;
  z-index: 20;
  letter-spacing: -1px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  transition: color .3s;
}

/* ── SPIN WAITING ── */
.spin-waiting {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  text-align: center;
}
.spin-waiting.show { display: flex; }

/* ── Scoreboard mini ── */
.mini-scores {
  display: flex; flex-wrap: wrap; justify-content: center;
  gap: 6px; max-width: 500px;
}
.mini-score-chip {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50px; padding: 5px 12px;
  font-size: 12px;
}
.mini-score-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
.mini-score-pts { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:13px; color:var(--green); }

/* ── QUESTION SCREEN ── */
#screen-question {
  position:relative; justify-content:flex-end; padding:0;
  transition: background-image .4s ease;
}
#screen-question::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,5,0.88) 100%);
  z-index:0;
}

.question-panel {
  position:relative; z-index:5;
  width:100%; max-width:760px;
  padding:20px 28px 28px;
  display:flex; flex-direction:column; gap:14px;
  animation: rise .3s cubic-bezier(0.16,1,0.3,1) both;
  background: rgba(5,8,25,0.75);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(255,255,255,0.08);
}

/* Top HUD on question screen */
.q-hud {
  position:absolute; top:0; left:0; right:0;
  height:50px; z-index:10;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}

.q-hud-left { display:flex; align-items:center; gap:12px; }
.q-hud-counter {
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:11px; letter-spacing:2px; text-transform:uppercase;
  color:rgba(255,255,255,0.45);
}
.q-hud-cat {
  font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  padding:4px 10px; border-radius:2px;
  border:1px solid rgba(24,194,90,0.4); color:var(--green);
  background:rgba(24,194,90,0.08);
}
.q-hud-right { display:flex; align-items:center; gap:16px; }
.q-score-chip {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:16px; color:var(--green);
}

.q-timer-wrap { display:flex; align-items:center; gap:8px; }
.q-timer-bar { width:80px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.q-timer-fill { height:100%; background:var(--green); transition:width .1s linear, background .3s; }
.q-timer-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:15px; color:#fff; min-width:20px; }

.q-text {
  font-family:'Barlow Condensed',sans-serif; font-weight:800;
  font-size:clamp(20px,3vw,28px); line-height:1.2;
  color:#ffffff; text-shadow:0 2px 12px rgba(0,0,0,0.8);
  letter-spacing:-0.2px;
}

.q-options { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.opt-btn {
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.2);
  border-radius:6px; padding:14px 16px;
  text-align:left; cursor:pointer;
  transition:all .15s; backdrop-filter:blur(8px);
  font-family:'Barlow',sans-serif; font-size:14px;
  font-weight:600; color:#ffffff;
  line-height:1.4; display:flex; align-items:flex-start; gap:10px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
.opt-btn:hover:not(:disabled) { background:rgba(45,125,210,0.25); border-color:rgba(45,125,210,0.6); color:#fff; }
.opt-letter { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:13px; letter-spacing:1px; color:rgba(255,255,255,0.55); flex-shrink:0; margin-top:1px; transition:color .15s; }
.opt-btn:hover:not(:disabled) .opt-letter { color:#2d7dd2; }
.opt-btn.correct { background:rgba(24,194,90,0.2); border-color:var(--green); color:#fff; pointer-events:none; }
.opt-btn.correct .opt-letter { color:var(--green); }
.opt-btn.wrong { background:rgba(232,69,69,0.15); border-color:#e84545; color:rgba(255,255,255,0.5); pointer-events:none; }
.opt-btn.wrong .opt-letter { color:#e84545; }
.opt-btn:disabled:not(.correct):not(.wrong) { opacity:0.3; cursor:default; }

.q-feedback {
  display:none; align-items:center; gap:10px;
  padding:11px 14px; border-radius:3px; border-left:3px solid;
  font-size:13px; font-weight:500; backdrop-filter:blur(8px);
}
.q-feedback.show { display:flex; }
.q-feedback.correct-fb { background:rgba(24,194,90,0.15); border-color:var(--green); color:#7effc0; }
.q-feedback.wrong-fb   { background:rgba(232,69,69,0.15); border-color:#e84545; color:#ffb3b3; }
.fb-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:14px; letter-spacing:0.5px; text-transform:uppercase; display:block; margin-bottom:1px; }
.btn-next { margin-left:auto; padding:7px 18px; background:var(--green); color:#fff; border:none; border-radius:3px; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:12px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; flex-shrink:0; transition:background .15s; }
.btn-next:hover { background:var(--green-d); }

/* Waiting for player to answer */
.q-waiting { display:none; align-items:center; gap:10px; padding:12px; font-size:13px; color:rgba(255,255,255,0.4); }
.q-waiting.show { display:flex; }

/* ══════════════════════════════════════
   RESULTS SCREEN
══════════════════════════════════════ */
#screen-results { background:#0a1a10; overflow-y:auto; justify-content:flex-start; padding-top:40px; }

.results-inner { width:100%; max-width:480px; display:flex; flex-direction:column; gap:20px; }

.res-header { text-align:center; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08); }
.res-brand { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--green); margin-bottom:10px; display:block; }
.res-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:clamp(48px,10vw,80px); letter-spacing:-2px; color:#fff; line-height:1; }
.res-title span { color:var(--green); }
.res-msg { font-size:14px; color:rgba(255,255,255,0.45); margin-top:8px; }

.podium { display:flex; flex-direction:column; gap:8px; }

.podium-row {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:4px;
}
.podium-rank { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px; color:rgba(255,255,255,0.25); width:24px; flex-shrink:0; }
.podium-rank.gold { color:var(--green); }
.podium-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.podium-name { flex:1; font-size:14px; font-weight:500; }
.podium-you { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--green); background:rgba(24,194,90,0.1); padding:3px 8px; border-radius:2px; }
.podium-pts { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px; }

.res-btns { display:flex; flex-direction:column; gap:8px; padding-bottom:40px; }

.btn { width:100%; padding:14px; border:none; border-radius:3px; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:14px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--green); color:#fff; }
.btn-primary:hover { background:var(--green-d); }
.btn-ghost { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.55); border:1px solid rgba(255,255,255,0.1); font-size:13px; }
.btn-ghost:hover { border-color:rgba(255,255,255,0.25); color:#fff; }

/* ── MUTE BUTTON ── */
.mute-btn {
  position: fixed;
  top: 14px; right: 16px;
  z-index: 200;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .15s;
  color: rgba(255,255,255,0.5);
  font-size: 16px;
}
.mute-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.mute-btn.muted { color: rgba(255,255,255,0.2); }

/* ── VISUAL POLISH: screen transitions ── */
.screen.active {
  animation: screenIn .4s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes screenIn {
  from { opacity:0; transform:scale(0.97); }
  to   { opacity:1; transform:scale(1); }
}

/* ── SPIN SCREEN GLOW ── */
#screen-spin::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center 40%, rgba(24,194,90,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ── OPTION BUTTONS HOVER ANIMATION ── */
.opt-btn {
  transition: all .15s, transform .1s;
}
.opt-btn:hover:not(:disabled) {
  transform: translateX(3px);
}
.opt-btn.correct {
  animation: flashCorrect .4s ease;
}
.opt-btn.wrong {
  animation: flashWrong .4s ease;
}
@keyframes flashCorrect {
  0%,100% { background: rgba(24,194,90,0.2); }
  50%      { background: rgba(24,194,90,0.4); }
}
@keyframes flashWrong {
  0%,50%,100% { transform: translateX(0); }
  25%          { transform: translateX(-5px); }
  75%          { transform: translateX(5px); }
}

/* ── SCOREBOARD ROW ENTRANCE ── */
.sb-row {
  animation: rowIn .3s cubic-bezier(0.16,1,0.3,1) both;
}
.sb-row:nth-child(1) { animation-delay: .05s; }
.sb-row:nth-child(2) { animation-delay: .1s; }
.sb-row:nth-child(3) { animation-delay: .15s; }
.sb-row:nth-child(4) { animation-delay: .2s; }
.sb-row:nth-child(5) { animation-delay: .25s; }
.sb-row:nth-child(6) { animation-delay: .3s; }
@keyframes rowIn {
  from { opacity:0; transform:translateX(-16px); }
  to   { opacity:1; transform:translateX(0); }
}

/* ── TIMER PULSE when urgent ── */
.timer-urgent {
  animation: timerPulse .5s ease infinite;
}
@keyframes timerPulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.15); }
}

/* ══════════════════════════════════════
   SCOREBOARD SCREEN
══════════════════════════════════════ */
#screen-scoreboard { background:#0a1a10; gap:0; overflow-y:auto; justify-content:flex-start; padding-top:0; }

.sb-wrap {
  width:100%; max-width:480px;
  display:flex; flex-direction:column;
  padding: 36px 24px 40px;
  gap:0;
}

.sb-header {
  text-align:center;
  margin-bottom:28px;
}

.sb-label {
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:11px;
  letter-spacing:4px; text-transform:uppercase;
  color:var(--green); display:block; margin-bottom:6px;
}

.sb-round {
  font-family:'Barlow Condensed',sans-serif;

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SERVER = window.location.origin;

const params     = new URLSearchParams(window.location.search);
const ROOM_CODE  = params.get('room')   || '';
const MY_NAME    = params.get('player') || 'Jugador';
const IS_HOST    = params.get('host')   === 'true';

const LETTERS   = ['A','B','C','D'];
const TIME_LIMIT = 15;

// ── STATE ─────────────────────────────────────────────────────────────────────
let socket, roomState, myPlayer;
let isSpinning = false;
let spinAngle  = 0;
let timerInterval;
let sbCountdownInterval = null;

// ── CATEGORIES (default, overridden by server) ────────────────────────────────
let categories = [
  { id:'sports',   name:'Sports',    color:'#18c25a', emoji:'⚽' },
  { id:'geo',      name:'Geography', color:'#3B9EFF', emoji:'🌍' },
  { id:'culture',  name:'Culture',   color:'#f5a623', emoji:'🎭' },
  { id:'history',  name:'Historia',  color:'#e84545', emoji:'📜' },
  { id:'eu',       name:'EU',        color:'#a259ff', emoji:'🇪🇺' },
  { id:'kenya',    name:'Kenya',     color:'#cc2200', emoji:'🦒' },
  { id:'doble',    name:'x2 Pts',    color:'#FFD700', emoji:'⚡', special:true },
  { id:'robo',     name:'Robo',      color:'#ff4dff', emoji:'💸', special:true },
  { id:'bomba',    name:'Bomba',     color:'#ff6600', emoji:'💣', special:true },
  { id:'skip',     name:'SKIP',      color:'#00e5ff', emoji:'⏭️', special:true },
  { id:'suerte',   name:'Suerte',    color:'#00ff88', emoji:'🍀', special:true },
];

// ── CATEGORY BACKGROUNDS ─────────────────────────────────────────────────────
const CAT_BACKGROUNDS = {
  sports:  'bg-sport.jpg',
  geo:     'bg-geography.jpg',
  culture: 'bg-culture.jpg',
  history: 'bg-history.jpg',
  eu:      'bg-eu.jpg',
  kenya:   'bg-kenya.jpg',
};

function setCategoryBg(catId) {
  const img = CAT_BACKGROUNDS[catId] || 'bg-sport.jpg';
  const el = document.getElementById('screen-question');
  el.style.backgroundImage = `url('${img}')`;
  el.style.backgroundSize = 'cover';
  el.style.backgroundPosition = 'center';
  el.style.backgroundRepeat = 'no-repeat';
}
const Audio = (() => {
  let ctx = null;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, type, vol, dur, delay = 0) {
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      gain.gain.setValueAtTime(0, c.currentTime + delay);
      gain.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }

  function noise(vol, dur, delay = 0) {
    try {
      const c = getCtx();
      const buf = c.createBuffer(1, c.sampleRate * dur, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
      const src = c.createBufferSource();
      const gain = c.createGain();
      const filter = c.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800;
      src.buffer = buf;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(c.destination);
      gain.gain.setValueAtTime(vol, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      src.start(c.currentTime + delay);
      src.stop(c.currentTime + delay + dur + 0.05);
    } catch(e) {}
  }

  return {
    // Ruleta girando — tick-tick-tick acelerando
    spinTick() {
      tone(600, 'square', 0.08, 0.04);
    },

    // Ruleta frenando — ticks más lentos y graves
    spinSlowing() {
      tone(400, 'square', 0.1, 0.06);
    },

    // Categoría revelada — fanfarria corta
    categoryReveal() {
      tone(523, 'sine', 0.3, 0.12, 0);
      tone(659, 'sine', 0.3, 0.12, 0.1);
      tone(784, 'sine', 0.35, 0.22, 0.2);
    },

    // Respuesta correcta — acorde positivo
    correct() {
      tone(523, 'sine', 0.25, 0.15, 0);
      tone(659, 'sine', 0.25, 0.15, 0.08);
      tone(784, 'sine', 0.28, 0.25, 0.16);
      tone(1047,'sine', 0.22, 0.3,  0.28);
    },

    // Respuesta incorrecta — sonido negativo
    wrong() {
      tone(300, 'sawtooth', 0.2, 0.15, 0);
      tone(220, 'sawtooth', 0.2, 0.2,  0.15);
    },

    // Tiempo agotado — alarma
    timeout() {
      tone(880, 'square', 0.15, 0.08, 0);
      tone(440, 'square', 0.15, 0.08, 0.1);
      tone(880, 'square', 0.15, 0.08, 0.2);
      tone(220, 'square', 0.2,  0.3,  0.3);
    },

    // Marcador aparece — whoosh
    scoreboard() {
      tone(200, 'sine', 0.15, 0.08, 0);
      tone(400, 'sine', 0.15, 0.08, 0.05);
      tone(600, 'sine', 0.12, 0.12, 0.1);
    },

    // Cuenta atrás — tick urgente (últimos 3s)
    countdownTick() {
      tone(1000, 'square', 0.12, 0.05);
    },

    // Victoria / resultados — fanfarria grande
    victory() {
      const notes = [523,659,784,1047,1319];
      notes.forEach((f, i) => tone(f, 'sine', 0.25, 0.3, i * 0.12));
    },

    // Botón click
    click() {
      tone(800, 'sine', 0.1, 0.06);
      noise(0.05, 0.04, 0);
    },

    // Jugador entra al lobby
    playerJoin() {
      tone(440, 'sine', 0.15, 0.1, 0);
      tone(550, 'sine', 0.15, 0.12, 0.08);
    },
  };
})();

let spinCountdownInterval = null;
const SPIN_TIME = 15;

function showSpin(room) {
  showScreen('spin');
  const cp = room.players[room.currentPlayerIdx];
  document.getElementById('turn-name').textContent = cp ? cp.name : '—';
  document.getElementById('spin-round-badge').textContent = `Ronda ${room.currentRound||1} / ${room.totalRounds||6}`;
  drawWheel(categories, spinAngle);

  isSpinning = false;
  clearInterval(spinCountdownInterval);
  document.getElementById('cat-reveal').classList.remove('show');

  const myTurn = myPlayer && cp && cp.id === myPlayer.id;
  const controls = document.getElementById('spin-controls');
  const waitEl   = document.getElementById('spin-wait');

  if (myTurn) {
    controls.style.display = 'flex';
    waitEl.classList.remove('show');
    document.getElementById('btn-spin').disabled = false;

    // Start 15s countdown — auto-spin if player doesn't
    let t = SPIN_TIME;
    const badge = document.getElementById('spin-countdown-badge');
    const num   = document.getElementById('spin-timer-num');
    if (badge) badge.style.display = 'block';
    if (num)   num.textContent = t;

    spinCountdownInterval = setInterval(() => {
      t--;
      if (num) num.textContent = t;
      if (badge) badge.style.color = t <= 5 ? '#e84545' : t <= 8 ? '#f5a623' : '#fff';
      if (t <= 0) {
        clearInterval(spinCountdownInterval);
        if (badge) badge.style.display = 'none';
        spinWheel();
      }
    }, 1000);
  } else {
    controls.style.display = 'none';
    // Hide badge for spectators
    const badge = document.getElementById('spin-countdown-badge');
    if (badge) badge.style.display = 'none';
    waitEl.classList.add('show');
    document.getElementById('spin-wait-text').textContent = `${cp ? cp.name : '—'} está girando...`;
  }

  renderMiniScores(room);
}

function spinWheel() {
  if (isSpinning) return;
  clearInterval(spinCountdownInterval);
  const badge = document.getElementById('spin-countdown-badge');
  if (badge) badge.style.display = 'none';
  socket.emit('game:startSpin', { catId: null });
  document.getElementById('btn-spin').disabled = true;
  document.getElementById('spin-controls').style.display = 'none';
}

function doSpin(catId, diff, special, isMeTurn, extra) {
  if (isSpinning) return;
  isSpinning = true;

  const cat = categories.find(c => c.id === catId);
  if (!cat) { isSpinning = false; return; }

  const n = categories.length;
  const catIdx = categories.findIndex(c => c.id === catId);
  const slice = (2 * Math.PI) / n;

  // Target angle: pointer (LEFT = π) points to center of catIdx slice
  // spinAngle - π/2 + catIdx*slice + slice/2 = π
  // spinAngle = 3π/2 - catIdx*slice - slice/2
  const targetAngle = (3 * Math.PI / 2) - catIdx * slice - slice / 2;
  const tgtNorm = ((targetAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const curNorm = ((spinAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const angleDiff = ((tgtNorm - curNorm) + Math.PI*2) % (Math.PI*2);

  // Use server-provided extra so ALL clients land on the SAME final angle
  const extraRots = extra || (5 + Math.random() * 3);
  const target = spinAngle + extraRots * Math.PI * 2 + angleDiff;

  const dur = 4200;
  const start = performance.now();
  const startAng = spinAngle;
  const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

  function frame(now) {
    const p = Math.min((now - start) / dur, 1);
    spinAngle = startAng + (target - startAng) * ease(p);
    drawWheel(categories, spinAngle);
    if (p < 1) { requestAnimationFrame(frame); return; }

    isSpinning = false;
    spinAngle = tgtNorm; // snap to exact final angle
    drawWheel(categories, spinAngle, catId); // highlight winning slice

    // Everyone sees the reveal
    showReveal(cat, diff, special);

    // Only current player sends spinResult to server
    if (isMeTurn) {
      setTimeout(() => {
        socket.emit('game:spinResult', { categoryId: catId, difficulty: diff, special: special || null });
      }, 2000);
    }
  }
  requestAnimationFrame(frame);
}

function showReveal(cat, diff, special) {
  const reveal = document.getElementById('cat-reveal');
  reveal.style.background = hexToRgba(cat.color, 0.15);
  reveal.style.borderColor = hexToRgba(cat.color, 0.6);
  reveal.style.color = cat.color;

  let nameText = cat.name.toUpperCase();
  if (special) {
    const specialNames = { doble:'⚡ x2 Puntos', robo:'💸 Robo', bomba:'💣 Bomba', skip:'⏭️ SKIP', suerte:'🍀 Suerte' };
    nameText = specialNames[special] || cat.name.toUpperCase();
  }
  document.getElementById('cat-reveal-name').textContent = nameText;

  // Add difficulty badge
  let badge = document.getElementById('cat-diff-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.id = 'cat-diff-badge';
    badge.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-top:4px;';
    reveal.appendChild(badge);
  }
  if (special) {
    const specialDesc = { doble:'Pregunta vale el doble', robo:'Si aciertas, robas puntos al líder', bomba:'Si fallas pierdes puntos', skip:'Turno perdido', suerte:'+6 puntos gratis 🎉' };
    badge.textContent = specialDesc[special] || '';
    badge.style.background = hexToRgba(cat.color, 0.2);
    badge.style.color = cat.color;
  } else {
    const diffLabel = { easy:'Fácil +3', medium:'Medio +6', hard:'Difícil +12' }[diff] || '';
    const diffColor = { easy:'#18c25a', medium:'#f5a623', hard:'#e84545' }[diff] || '#fff';
    badge.textContent = diffLabel;
    badge.style.background = hexToRgba(diffColor, 0.2);
    badge.style.color = diffColor;
  }

  reveal.classList.add('show');
  setTimeout(() => reveal.classList.remove('show'), 2500);
}

function drawWheel(cats, angle, highlightId = null) {
  const canvas = document.getElementById('wheel-canvas');
  if (!canvas) return;
  const W = canvas.width, H = canvas.height;
  const ctx = canvas.getContext('2d');
  const cx = W/2, cy = H/2, r = W/2 - 6;
  const n = cats.length;
  const slice = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, W, H);

  cats.forEach((cat, i) => {
    const s = angle - Math.PI/2 + i * slice;
    const e = s + slice;
    const highlight = highlightId === cat.id;

    // Slice fill
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, highlight ? r + 4 : r, s, e);
    ctx.closePath();
    ctx.fillStyle = highlight ? lightenColor(cat.color) : cat.color;
    ctx.fill();
    ctx.strokeStyle = '#0d1130';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text (emoji + short name), rotated along slice
    const mid = s + slice / 2;
    const emojiR = r * 0.72;
    const nameR  = r * 0.45;
    const emojiSize = Math.max(12, Math.min(18, Math.floor(r * slice / 2.5)));
    const nameSize  = Math.max(7,  Math.min(11, Math.floor(r * slice / 4)));

    // Emoji
    ctx.save();
    ctx.translate(cx + Math.cos(mid) * emojiR, cy + Math.sin(mid) * emojiR);
    ctx.rotate(mid + Math.PI/2);
    ctx.font = `${emojiSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(cat.emoji || '', 0, 0);
    ctx.restore();

    // Short name
    const shortName = cat.name.length > 6 ? cat.name.slice(0, 6) : cat.name;
    ctx.save();
    ctx.translate(cx + Math.cos(mid) * nameR, cy + Math.sin(mid) * nameR);
    ctx.rotate(mid + Math.PI/2);
    ctx.font = `bold ${nameSize}px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(shortName.toUpperCase(), 0, 0);
    ctx.restore();
  });

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(45,125,210,0.5)';
  ctx.lineWidth = 5;
  ctx.stroke();
}


function lightenColor(hex) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + 60);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + 60);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + 60);
  return `rgb(${r},${g},${b})`;
}

function hexToRgba(hex, alpha) {
  if (!hex || !hex.startsWith('#')) return `rgba(100,100,100,${alpha})`;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── QUESTION ──────────────────────────────────────────────────────────────────
function showQuestion(room) {
  showScreen('question');
  const q      = room.currentQuestion;
  const cat    = categories.find(c => c.id === room.currentCategory);
  const cp     = room.players[room.currentPlayerIdx];
  const myTurn = myPlayer && cp && cp.id === myPlayer.id;

  setCategoryBg(room.currentCategory);

  document.getElementById('q-counter').textContent = `Ronda ${room.currentRound||1} / ${room.totalRounds||6}`;
  
  // Show special effect badge
  const catName = cat ? cat.name : '—';
  const specialBadges = {
    doble: '⚡ DOBLE PUNTOS',
    robo:  '💸 ROBO',
    bomba: '💣 BOMBA',
  };
  const specialLabel = room.specialEffect && specialBadges[room.specialEffect]
    ? `${catName} · ${specialBadges[room.specialEffect]}`
    : catName;
  document.getElementById('q-cat').textContent = specialLabel;
  document.getElementById('q-text').textContent = q ? q.q : '—';

  const myScore = room.players.find(p => p.name === MY_NAME);
  document.getElementById('my-score-hud').textContent = `${myScore ? myScore.score : 0} pts`;

  // Check if I already answered
  const myAnswer = room.allAnswers && room.allAnswers.find(a => a.playerName === MY_NAME);
  const iHaveAnswered = !!myAnswer;

  // Options — ONLY current player can answer
  const grid = document.getElementById('q-options');
  grid.innerHTML = '';
  if (q) {
    const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
    shuffled.forEach((opt, i) => {
      const cleanOpt = opt.trim();
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      const letter = document.createElement('span');
      letter.className = 'opt-letter';
      letter.textContent = LETTERS[i] || String.fromCharCode(65 + i);
      btn.appendChild(letter);
      btn.appendChild(document.createTextNode(cleanOpt));

      if (!myTurn || iHaveAnswered) {
        btn.disabled = true;
        if (iHaveAnswered) {
          if (cleanOpt === q.a.trim()) btn.classList.add('correct');
          else if (myAnswer && cleanOpt === myAnswer.answer.trim() && myAnswer.answer.trim() !== q.a.trim()) btn.classList.add('wrong');
        }
      } else {
        btn.onclick = () => submitAnswer(cleanOpt, q.a);
      }
      grid.appendChild(btn);
    });
  }

  document.getElementById('q-feedback').className = 'q-feedback';

  // Status text
  const waitEl = document.getElementById('q-waiting');
  const waitTxt = document.getElementById('q-waiting-text');
  waitEl.className = 'q-waiting show';
  if (myTurn && !iHaveAnswered) {
    waitTxt.textContent = '¡Es tu turno! Responde...';
    waitEl.className = 'q-waiting'; // hide waiting dots when it's my turn
  } else if (!myTurn) {
    waitTxt.textContent = `Turno de ${cp ? cp.name : '—'} — espera tu turno`;
  } else {
    waitTxt.textContent = 'Respuesta enviada, esperando...';
  }

  // Timer — only for current player
  clearInterval(timerInterval);
  let t = TIME_LIMIT;
  updateTimer(t);
  if (myTurn && !iHaveAnswered) {
    timerInterval = setInterval(() => {
      t--;
      updateTimer(t);
      if (t <= 0) {
        clearInterval(timerInterval);
        submitAnswer('__timeout__', q ? q.a : '');
      }
    }, 1000);
  }
}

function updateTimer(t) {
  const fill = document.getElementById('timer-fill');
  fill.style.width = `${(t / TIME_LIMIT) * 100}%`;
  fill.style.background = t <= 4 ? '#e84545' : t <= 8 ? '#f5a623' : 'var(--green)';
  document.getElementById('timer-num').textContent = t;
  if (t <= 5 && t > 0) Audio.countdownTick();
}

function submitAnswer(answer, correctA) {
  clearInterval(timerInterval);
  const cleanAnswer = (answer || '').trim();
  const cleanCorrect = (correctA || '').trim();
  const isCorrect = cleanAnswer === cleanCorrect && cleanAnswer !== '';
  if (isCorrect) Audio.correct();
  else if (answer === '__timeout__') Audio.timeout();
  else Audio.wrong();

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const txt = btn.textContent.replace(/^[A-D]/, '').trim();
    if (txt === cleanCorrect) btn.classList.add('correct');
    else if (txt === cleanAnswer && cleanAnswer !== cleanCorrect) btn.classList.add('wrong');
  });
  setTimeout(() => socket.emit('game:answer', { answer: cleanAnswer }), 400);
}

function showAnswer(room) {
  clearInterval(timerInterval);
  showScoreboard(room);
}

function showScoreboard(room) {
  showScreen('scoreboard');
  clearInterval(sbCountdownInterval);
  Audio.scoreboard();

  console.log('📊 Scoreboard room.players:', JSON.stringify(room.players));
  console.log('📊 room.state:', room.state, 'questionIdx:', room.questionIdx);

  const la      = room.lastAnswer;
  const q       = room.currentQuestion;
  const cp      = room.players[room.currentPlayerIdx];
  const qIdx    = room.questionIdx || 0;
  const currentRound = room.currentRound || 1;
  const totalRounds  = room.totalRounds || 6;
  const remaining    = totalRounds - currentRound;

  document.getElementById('sb-round').textContent = `Ronda ${currentRound} de ${totalRounds}`;
  document.getElementById('sb-sub').textContent   = remaining > 0
    ? `Quedan ${remaining} ronda${remaining !== 1 ? 's' : ''}`
    : 'Última ronda';

  // Show last answer banner
  const isSkip    = la && la.special === 'skip';
  const isCorrect = la && la.correct && !isSkip;
  const diffPtsMap = { easy: 3, medium: 6, hard: 12 };
  const isSuerte  = la && la.special === 'suerte';
  const basePts = diffPtsMap[room.currentDifficulty] || 6;
  const actualPts = isCorrect ? (room.specialEffect === 'doble' ? basePts * 2 : basePts) : 0;
  const banner = document.getElementById('sb-banner');

  if (isSkip) {
    banner.className = 'sb-answer-banner wrong';
    document.getElementById('sb-icon').textContent         = '⏭️';
    document.getElementById('sb-banner-title').textContent = 'SKIP — Turno perdido';
    document.getElementById('sb-banner-detail').textContent = `${cp ? cp.name : '—'} ha perdido su turno`;
    document.getElementById('sb-banner-pts').style.display = 'none';
  } else if (isSuerte) {
    banner.className = 'sb-answer-banner correct';
    document.getElementById('sb-icon').textContent         = '🍀';
    document.getElementById('sb-banner-title').textContent = '¡Suerte! +6 puntos';
    document.getElementById('sb-banner-detail').textContent = `${cp ? cp.name : '—'} ha tenido suerte`;
    document.getElementById('sb-banner-pts').textContent   = '+6';
    document.getElementById('sb-banner-pts').style.display = 'block';
  } else {
    const roboSteal = isCorrect && room.specialEffect === 'robo';
    banner.className = `sb-answer-banner ${isCorrect ? 'correct' : 'wrong'}`;
    document.getElementById('sb-icon').textContent         = isCorrect ? (roboSteal ? '💸' : '+') : '—';
    document.getElementById('sb-banner-title').textContent = isCorrect
      ? (roboSteal ? '¡Robo! Puntos robados al líder' : 'Correcto')
      : 'Incorrecto';
    document.getElementById('sb-banner-detail').textContent = q ? `Respuesta correcta: ${q.a}` : '—';
    document.getElementById('sb-banner-pts').textContent  = isCorrect ? `+${actualPts}` : '';
    document.getElementById('sb-banner-pts').style.display = isCorrect ? 'block' : 'none';
  }

  // Sorted players — use roomState as fallback
  const playerList = (room.players && room.players.length > 0)
    ? room.players
    : (roomState && roomState.players ? roomState.players : []);
  const sorted = [...playerList].sort((a, b) => b.score - a.score);
  const maxScore = sorted[0] ? sorted[0].score : 1;

  document.getElementById('sb-list').innerHTML = sorted.map((p, i) => {
    const isMe     = p.name === MY_NAME;
    const isLeader = i === 0 && p.score > 0;
    const barW     = maxScore > 0 ? Math.round((p.score / maxScore) * 100) : 0;

    // Find this player's answer
    const playerAnswer = room.allAnswers && room.allAnswers.find(a => a.playerName === p.name);
    const answered = !!playerAnswer;
    const answeredCorrect = playerAnswer && playerAnswer.correct;
    const answerIndicator = answered
      ? `<span style="font-size:13px;margin-left:4px">${answeredCorrect ? '✓' : '✗'}</span>`
      : `<span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:4px">—</span>`;

    return `
      <div class="sb-row ${isLeader ? 'leader' : ''} ${isMe ? 'is-me' : ''}"
           style="--bar:${barW}%">
        <div class="sb-pos ${i === 0 ? 'first' : ''}">${i + 1}</div>
        <div class="sb-dot" style="background:${p.color}"></div>
        <span class="sb-name">${p.name} ${answerIndicator}</span>
        ${isMe ? '<span class="sb-you">Tú</span>' : ''}
        <span class="sb-score" style="color:${p.color}">${p.score}</span>
      </div>
    `;
  }).join('');

  // Next button — EVERYONE can proceed (first one to click advances)
  const canProceed = true;
  document.getElementById('sb-btn-next').classList.toggle('visible', canProceed);

  // Countdown — everyone triggers next turn
  let t = 5;
  const fill   = document.getElementById('sb-fill');
  const cdText = document.getElementById('sb-countdown-text');
  fill.style.width = '100%';
  fill.style.transition = 'none';

  sbCountdownInterval = setInterval(() => {
    t--;
    fill.style.transition = 'width 1s linear';
    fill.style.width = `${(t / 5) * 100}%`;
    cdText.textContent = t > 0 ? `Siguiente en ${t}s...` : 'Cargando...';
    if (t <= 3 && t > 0) Audio.countdownTick();
    if (t <= 0) {
      clearInterval(sbCountdownInterval);
      proceedNextTurn();
    }
  }, 1000);
}


function proceedNextTurn() {
  clearInterval(sbCountdownInterval);
  clearInterval(spinCountdownInterval);
  isSpinning = false;
  socket.emit('game:nextTurn');
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults(room) {
  clearInterval(timerInterval);
  showScreen('results');
  setTimeout(() => Audio.victory(), 300);

  const sorted = [...room.players].sort((a, b) => b.score - a.score);
  const medals = ['🥇','🥈','🥉'];

  const winner = sorted[0];
  document.getElementById('res-title').innerHTML = `<span>${winner ? winner.score : 0}</span> pts`;
  document.getElementById('res-msg').textContent = winner
    ? `${winner.name} gana la partida`
    : 'Partida terminada';

  document.getElementById('podium').innerHTML = sorted.map((p, i) => `
    <div class="podium-row">
      <div class="podium-rank ${i === 0 ? 'gold' : ''}">${medals[i] || i+1}</div>
      <div class="podium-dot" style="background:${p.color}"></div>
      <span class="podium-name">${p.name}</span>
      ${p.name === MY_NAME ? '<span class="podium-you">Tú</span>' : ''}
      <span class="podium-pts" style="color:${p.color}">${p.score}</span>
    </div>
  `).join('');
}

// ── MINI SCORES ───────────────────────────────────────────────────────────────
function renderMiniScores(room) {
  const sorted = [...room.players].sort((a, b) => b.score - a.score);
  document.getElementById('mini-scores').innerHTML = sorted.map(p => `
    <div class="mini-score-chip">
      <div class="dot" style="background:${p.color}"></div>
      <span style="font-size:12px">${p.name}</span>
      <span class="mini-score-pts">${p.score}</span>
    </div>
  `).join('');
}

// ── NAV ──────────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + id);
  if (el) el.classList.add('active');
}

function playAgain() { window.location.href = 'trivial-lobby.html'; }
function goHome()    { window.location.href = 'trivial-modos.html'; }

// ── MUTE ──────────────────────────────────────────────────────────────────────
let muted = false;
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('mute-btn');
  if (btn) btn.classList.toggle('muted', muted);
  const onEl  = document.getElementById('mute-icon-on');
  const offEl = document.getElementById('mute-icon-off');
  if (onEl)  onEl.style.display  = muted ? 'none'  : 'block';
  if (offEl) offEl.style.display = muted ? 'block' : 'none';
  Object.keys(Audio).forEach(k => {
    if (typeof Audio[k] === 'function') {
      if (muted) { Audio['_' + k] = Audio[k]; Audio[k] = () => {}; }
      else if (Audio['_' + k]) { Audio[k] = Audio['_' + k]; }
    }
  });
}

// ── CONNECT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  drawWheel(categories, 0);
  connectSocket();
});

function connectSocket() {
  socket = io(SERVER, { transports: ['polling'], reconnection: true, timeout: 8000 });

  socket.on('connect', () => {
    console.log('✅ Conectado, socket id:', socket.id);
    socket.emit('room:rejoin', { code: ROOM_CODE, playerName: MY_NAME });
  });

  socket.on('room:update', (room) => {
    roomState = room;
    myPlayer = room.players.find(p => p.name === MY_NAME);
    handleRoomUpdate(room);
  });

  // ALL players receive same spin result and animate
  socket.on('game:doSpin', ({ catId, diff, special, extra }) => {
    if (!roomState) return;
    const cp = roomState.players[roomState.currentPlayerIdx];
    const isMeTurn = myPlayer && cp && cp.id === myPlayer.id;
    doSpin(catId, diff, special, isMeTurn, extra);
  });

  socket.on('error', (data) => {
    if (data && data.msg && data.msg.includes('Sala no encontrada')) {
      setTimeout(() => { window.location.href = 'trivial-lobby.html'; }, 1500);
    }
  });

  socket.on('connect_error', (err) => console.log('❌ Error conexión:', err.message));
  socket.on('disconnect', (reason) => console.log('🔌 Desconectado:', reason));
}

// ── ROOM UPDATE ───────────────────────────────────────────────────────────────
function handleRoomUpdate(room) {
  if (room.categories && room.categories.length > categories.length) categories = room.categories;
  switch (room.state) {
    case 'waiting':
    case 'lobby':
      showWaiting(room);
      setTimeout(() => {
        if (roomState && (roomState.state === 'lobby' || roomState.state === 'waiting')) {
          socket.emit('room:rejoin', { code: ROOM_CODE, playerName: MY_NAME });
        }
      }, 2000);
      break;
    case 'spinning': showSpin(room);     break;
    case 'question': showQuestion(room); break;
    case 'answer':   showAnswer(room);   break;
    case 'finished': showResults(room);  break;
  }
}

// ── WAITING ───────────────────────────────────────────────────────────────────
function showWaiting(room) {
  showScreen('waiting');
  const list = document.getElementById('wait-players');
  list.innerHTML = room.players.map(p => `
    <div class="wait-player">
      <div class="wait-dot" style="background:${p.color}"></div>
      <span class="wait-name">${p.name}</span>
      ${p.name === MY_NAME ? '<span class="wait-you">Tú</span>' : ''}
    </div>
  `).join('');
}
