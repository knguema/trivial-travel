<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivial — Juego vs IA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --green:   #2d7dd2;
  --green-d: #1a6ab8;
  --white:   #ffffff;
  --text:    #0a0e1a;
  --muted:   #8892b0;
  --border:  #1e2a4a;
  --bg:      #ffffff;
}

html, body {
  height: 100%;
  font-family: 'Barlow', sans-serif;
  background: #0a1a10;
  color: var(--text);
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  height: 100vh;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}
.screen.active { display: flex; }

/* ── GAME BACKGROUND ── */
#screen-game {
  background: url('bg-ia.png') center center / cover no-repeat;
  background-attachment: fixed;
  image-rendering: high-quality;
  position: relative;
}

#screen-game::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.05) 40%,
    rgba(0,0,0,0.55) 68%,
    rgba(0,0,0,0.88) 100%
  );
  z-index: 0;
}

/* ── TOP HUD ── */
.topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 10;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.btn-exit {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 6px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all .15s;
}
.btn-exit:hover { background: rgba(255,255,255,0.15); color: #fff; }
.btn-exit svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

.topbar-level {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.score-display { text-align: right; }
.score-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  display: block;
}
.score-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--green);
  line-height: 1;
}

/* ── PROGRESS BAR ── */
.progress-bar {
  position: absolute;
  top: 52px; left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.1);
  z-index: 10;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  transition: width .4s ease;
}

/* ── BOTTOM PANEL ── */
.game-inner {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 780px;
  padding: 24px 28px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: rise .35s cubic-bezier(0.16,1,0.3,1) both;
}

/* ── QUESTION META ── */
.q-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.q-counter {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

.q-category {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 2px;
  border: 1px solid rgba(24,194,90,0.4);
  color: var(--green);
  background: rgba(24,194,90,0.08);
}

/* ── TIMER ── */
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.timer-bar {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  overflow: hidden;
}

.timer-fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width .1s linear, background .3s;
}

.timer-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: #fff;
  min-width: 22px;
  text-align: right;
}

/* ── QUESTION TEXT ── */
.question-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: clamp(20px, 2.8vw, 28px);
  line-height: 1.15;
  color: #ffffff;
  letter-spacing: -0.2px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.5);
}

/* ── OPTIONS ── */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.opt-btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 4px;
  padding: 14px 16px;
  text-align: left;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  backdrop-filter: blur(6px);
}

.opt-btn:hover:not(:disabled) {
  background: rgba(24,194,90,0.15);
  border-color: rgba(24,194,90,0.5);
  color: #fff;
}

.opt-letter {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  flex-shrink: 0;
  margin-top: 2px;
  transition: color .15s;
}

.opt-btn:hover:not(:disabled) .opt-letter { color: var(--green); }

.opt-btn.correct {
  background: rgba(24,194,90,0.2);
  border-color: var(--green);
  color: #fff;
  pointer-events: none;
}
.opt-btn.correct .opt-letter { color: var(--green); }

.opt-btn.wrong {
  background: rgba(232,69,69,0.15);
  border-color: #e84545;
  color: rgba(255,255,255,0.6);
  pointer-events: none;
}
.opt-btn.wrong .opt-letter { color: #e84545; }

.opt-btn:disabled:not(.correct):not(.wrong) {
  opacity: 0.35;
  cursor: default;
}

/* ── FEEDBACK ── */
.feedback {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: 4px;
  border-left: 3px solid;
  font-size: 13px;
  font-weight: 500;
  backdrop-filter: blur(8px);
}
.feedback.show { display: flex; }
.feedback.correct-fb { background: rgba(24,194,90,0.15); border-color: var(--green); color: #7effc0; }
.feedback.wrong-fb   { background: rgba(232,69,69,0.15); border-color: #e84545; color: #ffb3b3; }

.feedback-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 1px;
}

.btn-next {
  margin-left: auto;
  padding: 8px 20px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 3px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s;
}
.btn-next:hover { background: var(--green-d); }

/* ── RESULTS SCREEN ── */
#screen-results {
  background: #0a1a10;
  overflow-y: auto;
  justify-content: center;
  padding: 40px 24px;
  min-height: 100vh;
  height: auto;
}

.results-inner {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  animation: rise .4s cubic-bezier(0.16,1,0.3,1) both;
}

.result-header {
  text-align: center;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.result-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 10px;
  display: block;
}

.result-score-big {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: clamp(64px, 14vw, 96px);
  line-height: 1;
  color: #ffffff;
  letter-spacing: -3px;
}

.result-score-big span { color: var(--green); }

.result-msg {
  font-size: 15px;
  color: rgba(255,255,255,0.5);
  margin-top: 8px;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.stat-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 16px;
  text-align: center;
}

.stat-box-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: #ffffff;
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-box-label {
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}

/* ── IA SCORE ── */
.ia-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
}

.ia-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

.ia-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: #ffffff;
}

.ia-verdict {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 2px;
}
.verdict-win  { background: rgba(24,194,90,0.2);  color: #7effc0; }
.verdict-loss { background: rgba(232,69,69,0.2);  color: #ffb3b3; }
.verdict-draw { background: rgba(245,166,35,0.2); color: #ffd98a; }

/* ── BUTTONS ── */
.result-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .15s;
}

.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-d); }

.btn-ghost {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 13px;
}
.btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
@keyframes rise {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}

@media (max-width: 500px) {
  .options { grid-template-columns: 1fr; }
  .topbar  { padding: 0 16px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- GAME SCREEN -->
<div class="screen active" id="screen-game">

  <!-- TOPBAR (inside game screen, position absolute) -->
  <div class="topbar" id="topbar" style="display:none">
    <div class="topbar-left">
      <button class="btn-exit" onclick="exitGame()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Salir
      </button>
      <span class="topbar-level" id="topbar-level">Fácil</span>
    </div>
    <div class="topbar-right">
      <div class="score-display">
        <span class="score-label">Puntos</span>
        <span class="score-val" id="score-display">0</span>
      </div>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar" style="display:none">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="game-inner">

    <div class="q-meta">
      <span class="q-counter" id="q-counter">Pregunta 1 / 10</span>
      <span class="q-category" id="q-category">Geografía</span>
    </div>

    <div class="timer-wrap">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill"></div>
      </div>
      <span class="timer-num" id="timer-num">20</span>
    </div>

    <div class="question-text" id="question-text">¿Cuál es la capital de Francia?</div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback">
      <div>
        <span class="feedback-title" id="feedback-title">Correcto</span>
        <span id="feedback-detail"></span>
      </div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">
        Siguiente →
      </button>
    </div>

  </div>
</div>

<!-- RESULTS SCREEN -->
<div class="screen" id="screen-results">
  <div class="results-inner">

    <div class="result-header">
      <span class="result-title">Partida terminada</span>
      <div class="result-score-big">
        <span id="res-score">0</span><span>/10</span>
      </div>
      <div class="result-msg" id="res-msg">Buen intento</div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-box-num" id="res-correct">0</span>
        <span class="stat-box-label">Correctas</span>
      </div>
      <div class="stat-box">
        <span class="stat-box-num" id="res-wrong">0</span>
        <span class="stat-box-label">Erróneas</span>
      </div>
      <div class="stat-box">
        <span class="stat-box-num" id="res-time">0s</span>
        <span class="stat-box-label">Tiempo medio</span>
      </div>
    </div>

    <div class="ia-row">
      <span class="ia-label">Puntuación IA</span>
      <span class="ia-score" id="ia-score-display">—</span>
      <span class="ia-verdict" id="ia-verdict">—</span>
    </div>

    <div class="result-btns">
      <button class="btn btn-primary" onclick="restartGame()">Jugar de nuevo</button>
      <button class="btn btn-ghost"   onclick="goToLevels()">Cambiar nivel</button>
      <button class="btn btn-ghost"   onclick="goHome()">Volver al inicio</button>
    </div>

  </div>
</div>

<script>
// ── QUESTIONS BANK ────────────────────────────────────────────────────────────
const QUESTIONS = {
  facil: [
    // SPORTS - EASY
    { q:'In which country were the first Ancient Olympic Games held?', a:'Greece', opts:['Italy','Greece','Turkey'], cat:'Sports' },
    { q:'Which Serbian legendary athlete has won the most Grand Slam titles in tennis history?', a:'Novak Djokovic', opts:['Novak Djokovic','Roger Federer','Rafael Nadal'], cat:'Sports' },
    { q:'Andriy Shevchenko is a legendary striker and former manager of which national team?', a:'Ukraine', opts:['Romania','Poland','Ukraine'], cat:'Sports' },
    { q:'Which Serbian basketball player is one of the greatest players currently in NBA?', a:'Nikola Jokić', opts:['Nikola Jokić','Luka Dončić','Stephen Curry'], cat:'Sports' },
    { q:'In which city is the famous "Circuit de Monaco," home to one of the most prestigious Formula 1 races?', a:'Monte Carlo', opts:['Monte Carlo','La Condamine','Fontvieille'], cat:'Sports' },
    { q:'Giannis Antetokounmpo, an NBA superstar, plays for which national team?', a:'Greece', opts:['Turkey','Poland','Greece'], cat:'Sports' },
    { q:'Which Portuguese superstar is the all-time leading scorer in international football and has won 5 Ballons d\'Or?', a:'Cristiano Ronaldo', opts:['Luís Figo','Cristiano Ronaldo','Thierry Henry'], cat:'Sports' },
    { q:'Roger Federer, one of the greatest tennis players of all time, represents which country?', a:'Switzerland', opts:['Austria','Germany','Switzerland'], cat:'Sports' },
    { q:'Which two European countries share the record for the most Football World Cup titles, having won 4 trophies each?', a:'Italy and Germany', opts:['France and Spain','Italy and Germany','England and Portugal'], cat:'Sports' },
    { q:'Luka Modrić, a Ballon d\'Or winner, was born in a country bordering Bosnia and Serbia. Which one?', a:'Croatia', opts:['Croatia','Montenegro','Albania'], cat:'Sports' },
    // GEOGRAPHY - EASY
    { q:'Kyiv is the capital city of which Eastern European country?', a:'Ukraine', opts:['Ukraine','Poland','Romania'], cat:'Geography' },
    { q:'Which country connects Europe and Asia?', a:'Turkey', opts:['Greece','Turkey','Bulgaria'], cat:'Geography' },
    { q:'Which large sea borders Ukraine to the south and Turkey to the north?', a:'The Black Sea', opts:['The Black Sea','The Mediterranean Sea','The Adriatic Sea'], cat:'Geography' },

    { q:'Which country is famous for its thousands of islands and is considered the "cradle of Western civilization"?', a:'Greece', opts:['Greece','Turkey','Montenegro'], cat:'Geography' },
    { q:'What is the capital city of Serbia, located where the Sava and Danube rivers meet?', a:'Belgrade', opts:['Athens','Belgrade','Ankara'], cat:'Geography' },
    { q:'Which country is known for its beautiful "fjords" and shares a long border with Sweden?', a:'Norway', opts:['Finland','Norway','Denmark'], cat:'Geography' },

    { q:'"Fado" is a traditional style of music from which country?', a:'Portugal', opts:['Italy','Albania','Portugal'], cat:'Culture' },
    { q:'Wiener Schnitzel is a famous traditional dish of which country?', a:'Austria', opts:['Austria','Hungary','Italy'], cat:'Culture' },
    { q:'Samba and Bossa Nova are traditional music genres of which country?', a:'Brazil', opts:['Brazil','Mexico','Suriname'], cat:'Culture' },
    // HISTORY - EASY
    { q:'The euro is the least used currency in the European Union.', a:'False', opts:['True','False'], cat:'History' },
    { q:'Which UK prime minister resigned because of Brexit?', a:'David Cameron', opts:['David Cameron','Rishi Sunak','Keir Starmer'], cat:'History' },
    { q:'Which country gifted the Statue of Liberty to the United States?', a:'France', opts:['Italy','Germany','France'], cat:'History' },
    { q:'Which country withdrew its membership from the European Union in 2020?', a:'United Kingdom', opts:['United Kingdom','France','Italy'], cat:'History' },

    { q:'In which country did the Industrial Revolution begin?', a:'England', opts:['Portugal','France','England'], cat:'History' },
    { q:'Which European country was the birthplace of democracy?', a:'Greece', opts:['France','Italy','Greece'], cat:'History' },
    // EU - EASY
    { q:'How many stars are on the flag of the European Union?', a:'12', opts:['12','27','16'], cat:'EU' },
    { q:'How many countries are currently members of the European Union?', a:'27', opts:['27','28','29'], cat:'EU' },
    { q:'Which European Union programme allows students to study in another country?', a:'Erasmus+', opts:['Erasmus+','Bologna Plan','The European Solidarity Corps'], cat:'EU' },
  ],
  medio: [
    // SPORTS - MEDIUM
    { q:'Galatasaray, Fenerbahçe, and Beşiktaş are the "Big Three" football clubs of which city?', a:'Istanbul', opts:['Belgrade','Istanbul','Warsaw'], cat:'Sports' },
    { q:'Which German Formula 1 driver won 7 World Championships and is a global icon for Ferrari?', a:'Michael Schumacher', opts:['Lewis Hamilton','Michael Schumacher','Nico Rosberg'], cat:'Sports' },
    { q:'In 2004, which country surprised the world by winning the UEFA European Football Championship?', a:'Greece', opts:['Albania','Greece','Czech Republic'], cat:'Sports' },
    { q:'Which iconic stadium in London, famous for its giant "arch," is considered the home of English football?', a:'Wembley Stadium', opts:['Old Trafford','Camp Nou','Wembley Stadium'], cat:'Sports' },
    { q:'Brazil is the most successful national team in World Cup history. How many titles have they won?', a:'5', opts:['4','5','6'], cat:'Sports' },

    { q:'Which Italian motorcycling legend, nicknamed "The Doctor," won 9 World Championships during his career?', a:'Valentino Rossi', opts:['Max Biaggi','Giacomo Agostini','Valentino Rossi'], cat:'Sports' },
    { q:'Edin Džeko is a legendary football striker and a symbol of national unity for which country?', a:'Bosnia and Herzegovina', opts:['Serbia','Bosnia and Herzegovina','Montenegro'], cat:'Sports' },
    { q:'"Panathinaikos" and "Olympiacos" are the two biggest rival clubs in which country?', a:'Greece', opts:['Turkey','Albania','Greece'], cat:'Sports' },

const LEVELS_LABEL = { facil:'Fácil', medio:'Medio', dificil:'Difícil' };
const TOTAL_Q = 10;
const TIME_LIMIT = { facil:20, medio:15, dificil:10 };
const LETTERS = ['A','B','C','D'];

// ── STATE ────────────────────────────────────────────────────────────────────
let level, questions, currentIdx, score, correct, wrong, timerInterval, timeLeft, timeTaken, totalTime;
let iaScore;

// ── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  level = params.get('nivel') || 'facil';
  startGame();
});

function startGame() {
  const pool = [...QUESTIONS[level]].sort(() => Math.random() - 0.5).slice(0, TOTAL_Q);
  questions   = pool;
  currentIdx  = 0;
  score       = 0;
  correct     = 0;
  wrong       = 0;
  totalTime   = 0;
  iaScore     = simulateIA(level);

  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progress-bar').style.display = 'block';
  document.getElementById('topbar-level').textContent = LEVELS_LABEL[level];
  document.getElementById('score-display').textContent = '0';

  showScreen('game');
  loadQuestion();
}

function simulateIA(level) {
  const acc = { facil: 0.55, medio: 0.70, dificil: 0.88 };
  let s = 0;
  for (let i = 0; i < TOTAL_Q; i++) {
    if (Math.random() < acc[level]) s++;
  }
  return s;
}

// ── QUESTION ─────────────────────────────────────────────────────────────────
function loadQuestion() {
  const q = questions[currentIdx];
  const timeMax = TIME_LIMIT[level];

  document.getElementById('q-counter').textContent   = `Pregunta ${currentIdx + 1} / ${TOTAL_Q}`;
  document.getElementById('q-category').textContent  = q.cat;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = `${(currentIdx / TOTAL_Q) * 100}%`;

  // Set category background
  const catBgMap = { Sports:'bg-sport.jpg', Geography:'bg-geography.jpg', Culture:'bg-culture.jpg', History:'bg-history.jpg', EU:'bg-eu.jpg', Kenya:'bg-kenya.jpg' };
  const bg = catBgMap[q.cat] || 'bg-ia.png';
  document.getElementById('screen-game').style.backgroundImage = `url('${bg}')`;
  document.getElementById('screen-game').style.backgroundSize = 'cover';
  document.getElementById('screen-game').style.backgroundPosition = 'center';

  // Shuffle options
  const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
  const grid = document.getElementById('options');
  grid.innerHTML = '';
  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span>${opt}`;
    btn.onclick = () => answer(opt, q.a, shuffled);
    grid.appendChild(btn);
  });

  // Hide feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';

  // Timer
  timeLeft = timeMax;
  timeTaken = 0;
  updateTimer(timeLeft, timeMax);
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    timeTaken++;
    updateTimer(timeLeft, timeMax);
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeOut(q.a);
    }
  }, 1000);

  // Animate in
  const gi = document.querySelector('.game-inner');
  gi.style.animation = 'none';
  gi.offsetHeight;
  gi.style.animation = 'rise .3s cubic-bezier(0.16,1,0.3,1) both';
}

function updateTimer(t, max) {
  const pct = (t / max) * 100;
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.style.background = t <= 5 ? '#e84545' : t <= 10 ? '#f5a623' : 'var(--green)';
  document.getElementById('timer-num').textContent = t;
}

function answer(chosen, correct_a, opts) {
  clearInterval(timerInterval);
  totalTime += (TIME_LIMIT[level] - timeLeft);

  const isCorrect = chosen === correct_a;
  if (isCorrect) { score++; correct++; }
  else           { wrong++; }

  document.getElementById('score-display').textContent = score;

  // Style buttons
  document.querySelectorAll('.opt-btn').forEach(btn => {
    const txt = btn.textContent.slice(1).trim(); // remove letter
    // Match option text (could have letter prefix)
    const btnOpt = btn.textContent.replace(/^[A-D]/, '').trim();
    btn.disabled = true;
    if (btnOpt === correct_a) btn.classList.add('correct');
    else if (btnOpt === chosen && !isCorrect) btn.classList.add('wrong');
  });

  showFeedback(isCorrect, correct_a);
}

function timeOut(correct_a) {
  wrong++;
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const btnOpt = btn.textContent.replace(/^[A-D]/, '').trim();
    if (btnOpt === correct_a) btn.classList.add('correct');
  });
  showFeedback(false, correct_a, true);
}

function showFeedback(isCorrect, correct_a, timeout = false) {
  const fb    = document.getElementById('feedback');
  const title = document.getElementById('feedback-title');
  const detail= document.getElementById('feedback-detail');

  if (timeout) {
    fb.className = 'feedback wrong-fb show';
    title.textContent  = 'Tiempo agotado';
    detail.textContent = `La respuesta correcta era: ${correct_a}`;
  } else if (isCorrect) {
    fb.className = 'feedback correct-fb show';
    title.textContent  = 'Correcto';
    detail.textContent = `+1 punto`;
  } else {
    fb.className = 'feedback wrong-fb show';
    title.textContent  = 'Incorrecto';
    detail.textContent = `La respuesta correcta era: ${correct_a}`;
  }

  const nextLabel = currentIdx + 1 >= TOTAL_Q ? 'Ver resultados →' : 'Siguiente →';
  document.getElementById('btn-next').textContent = nextLabel;
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= TOTAL_Q) {
    showResults();
  } else {
    loadQuestion();
  }
}

// ── RESULTS ──────────────────────────────────────────────────────────────────
function showResults() {
  clearInterval(timerInterval);
  document.getElementById('progress-fill').style.width = '100%';

  const avgTime = correct + wrong > 0 ? Math.round(totalTime / TOTAL_Q) : 0;

  document.getElementById('res-score').textContent   = score;
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent   = wrong;
  document.getElementById('res-time').textContent    = avgTime + 's';
  document.getElementById('ia-score-display').textContent = `${iaScore} / ${TOTAL_Q}`;

  const verdict = document.getElementById('ia-verdict');
  if (score > iaScore) {
    verdict.textContent = 'Ganaste';
    verdict.className   = 'ia-verdict verdict-win';
  } else if (score < iaScore) {
    verdict.textContent = 'Perdiste';
    verdict.className   = 'ia-verdict verdict-loss';
  } else {
    verdict.textContent = 'Empate';
    verdict.className   = 'ia-verdict verdict-draw';
  }

  const pct = score / TOTAL_Q;
  let msg = '';
  if      (pct === 1)   msg = 'Perfecto. No falla ni una.';
  else if (pct >= 0.8)  msg = 'Muy bien, gran resultado.';
  else if (pct >= 0.6)  msg = 'Bien, pero hay margen de mejora.';
  else if (pct >= 0.4)  msg = 'Puedes hacerlo mejor.';
  else                   msg = 'Sigue practicando.';
  document.getElementById('res-msg').textContent = msg;

  showScreen('results');
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function restartGame() {
  startGame();
}

function goToLevels() {
  window.location.href = 'trivial-ia-nivel.html';
}

function goHome() {
  window.location.href = 'trivial-modos.html';
}

function exitGame() {
  clearInterval(timerInterval);
  goHome();
}
</script>
